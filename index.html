<!doctype html>
<html lang="zh-CN" data-theme="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interactive GPX and FIT visualizer" />
    <title>GPX / FIT Earth Visualizer</title>
    <script>
      try {
        const theme = window.localStorage.getItem("interactive-gpx-theme");
        if (theme === "light" || theme === "dark") {
          document.documentElement.dataset.theme = theme;
        }
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
